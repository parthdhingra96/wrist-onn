<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart – Wrist Onn</title>
    <link rel="stylesheet" href="./CSS/style.css" />
    <link rel="stylesheet" href="./CSS/cart.css" />
    <link rel="shortcut icon" href="./assets/img.jpeg" type="image/x-icon" />
  </head>
  <body class="cart-page">
    <header class="cart-topbar">
      <div class="cart-topbar-inner">
        <a class="cart-brand" href="index.html"
          >Wrist <span class="accent">Onn</span></a
        >

        <div class="cart-top-actions">
          <a class="cart-back-link" href="index.html">← Continue shopping</a>

          <button class="cart-mini-btn" type="button" aria-label="Cart">
            <span class="cart-icon">🛒</span>
            <span class="cart-count" id="cart-count">0</span>
          </button>
        </div>
      </div>
    </header>

    <main class="cart-shell">
      <div class="cart-layout">
        <!-- LEFT: Items -->
        <section class="cart-left">
          <h1 class="cart-title">Shopping Cart</h1>

          <div id="cart-empty" class="cart-empty-state" hidden>
            <p class="cart-empty-title">Your cart is empty</p>
            <p class="cart-empty-sub">
              Add some watches to see them here.
            </p>
            <a class="btn btn-primary cart-empty-btn" href="index.html"
              >Shop watches</a
            >
          </div>

          <div id="cart-items-list" class="cart-items-list"></div>
        </section>

        <!-- RIGHT: Summary + Checkout -->
        <aside class="cart-right">
          <div class="price-box">
            <h2 class="price-box-title">Price Details</h2>

            <div class="price-row">
              <span>Item Total</span>
              <span id="summary-item-total">₹0</span>
            </div>
            <div class="price-row">
              <span>Delivery Charge</span>
              <span id="summary-delivery">₹0</span>
            </div>
            <div class="price-row">
              <span>GST (5%)</span>
              <span id="summary-gst">₹0</span>
            </div>
            <div class="price-row">
              <span>Handling Fee</span>
              <span id="summary-handling">₹0</span>
            </div>

            <div class="price-divider"></div>

            <div class="price-row price-row--total">
              <span>Grand Total</span>
              <span id="summary-grand-total">₹0</span>
            </div>

            <button class="btn btn-primary price-cta" id="place-order-btn" type="button">
              Place Order
            </button>

            <section class="payment-section" id="payment-section" hidden>
              <h3 class="payment-title">Select Payment Method</h3>

              <label class="pay-option">
                <input type="radio" name="payment" value="card" />
                <span>Credit / Debit Card</span>
              </label>
              <label class="pay-option">
                <input type="radio" name="payment" value="upi" />
                <span>UPI</span>
              </label>
              <label class="pay-option">
                <input type="radio" name="payment" value="cod" />
                <span>Cash on Delivery</span>
              </label>

              <button
                class="btn btn-primary confirm-cta"
                id="confirm-order-btn"
                type="button"
                disabled
              >
                Confirm Order
              </button>

              <p class="order-success" id="order-success" hidden>
                Order placed successfully!
              </p>
            </section>
          </div>
        </aside>
      </div>
    </main>

    <script type="module" src="./JSFile/cart-page.js"></script>
  </body>
</html>
